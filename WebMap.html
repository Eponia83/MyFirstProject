<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Mein erstes Web-GIS</title>
        
        <!-->CSS-Library</!--> 
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.7/dist/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
        <style>
            #header {
                height: 75px;
                background-color: darkgoldenrod;
            }
            #mapdiv {
                height: 850px;
                background-color: salmon;
            }
            #side_panel {
                height: 850px;
                background-color: beige;
            }
            #footer {
                height: 75px;
                background-color: darkgoldenrod;
            }
        </style>
        
        <!-->Javaskript-Library "Leaflet"</!-->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        
        <!-->JQuery-Library</!-->
        <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
        
    </head>
    
    <body>
        <div id="header" class="col-md-12">
            <h1 class="text-center">Meine erste Karte</h1>
        </div>
        <div id="side-panel" class="col-md-3">
            <h1 class="text-center">Inhalt</h1>
        </div>
        <div id="mapdiv" class="col-md-9">
        </div>
        <div id="footer" class="col-md-12">
            <h4 id="map_coords" class="text-center">Längengrad: xy Breitengrad: xy Zoom: xy</h4>
            <h4 class="text-center">Copyright: Jennifer Reinecke; Background Map: Leaflet (c) OpenStreetMap Contributors</h4>
        </div>    
        
        <script>
            var mymap = L.map('mapdiv')
            mymap.setView([52.448529, 13.335558], [16])
            var backgroundLayer = L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png');
            mymap.addLayer(backgroundLayer);
        </script>
        
    </body>
</html>
